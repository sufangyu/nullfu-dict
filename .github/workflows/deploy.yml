name: Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            docs:
              - 'docs/**'
            packages:
              - 'packages/**'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build docs
        if: steps.changes.outputs.docs == 'true' || steps.changes.outputs.packages == 'true'
        run: cd docs && pnpm docs:build

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && (steps.changes.outputs.docs == 'true' || steps.changes.outputs.packages == 'true')
        run: |
          npx vercel deploy docs/.vitepress/dist \
          --prod \
          --token=${{ secrets.VERCEL_TOKEN }} \
          --yes
