name: Release

on:
  push:
    tags:
      - 'v*'          # 仅在推送 tag v* 时触发
  workflow_dispatch:  # 保留手动触发
    inputs:
      release-version:
        description: '发布版本号 (例如 v1.0.0)'
        required: false
        default: ''
      publish-release:
        description: '发布 Releases'
        required: false
        default: 'true'
      publish-npm:
        description: '发布 npm 包'
        required: false
        default: 'true'
      deploy-docs:
        description: '发布文档'
        required: false
        default: 'true'

permissions:
  contents: read
  id-token: write


jobs:
  # 环境准备 & 检测变更
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
            packages:
              - 'packages/**'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


  # 发布 npm 包
  publish:
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish-npm == 'true' || github.event_name != 'workflow_dispatch' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Node & pnpm from cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      - name: Build packages
        run: pnpm build

      # 3️⃣ Publish packages to npm
      # - name: Publish packages
      #   run: pnpm -r --filter "./packages/*" publish --no-git-checks --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release-version }}


  # 发布文档
  deploy-docs:
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy-docs == 'true' || github.event_name != 'workflow_dispatch' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Node & pnpm from cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build docs
        run: cd docs && pnpm docs:build

      - name: Deploy to Vercel
        run: |
          npx vercel deploy docs/.vitepress/dist \
          --prod \
          --name dict-manager \
          --token=${{ secrets.VERCEL_TOKEN }} \
          --yes
