name: Release

on:
  pull_request:
  push:
    tags:
      - 'v*'          # 仅在推送 tag v* 时触发
  workflow_dispatch:  # 保留手动触发

permissions:
  contents: read
  id-token: write


jobs:
  # 环境准备 & 检测变更
  setup:
    runs-on: ubuntu-latest
    outputs:
      changes-docs: ${{ steps.detect.outputs.docs }}
      changes-packages: ${{ steps.detect.outputs.packages }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'   # Node 24
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
            packages:
              - 'packages/**'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


  # 发布 npm（只在 packages 变化时触发）
  publish-npm:
    runs-on: ubuntu-latest
    needs: setup
    # if: needs.setup.outputs.changes-packages == 'true'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Node & pnpm from cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish packages
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}


